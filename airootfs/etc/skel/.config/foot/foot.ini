[main]
font=JetBrains Mono Nerd Font Mono:size=10
shell=/usr/bin/bash
pad=10x10

[colors-dark]
alpha=0.9
# Nord variant with darker background
foreground = eceff4
background = 2f2532

# Normal colors
regular0 = 3b4252  # black
regular1 = bf616a  # red
regular2 = a3be8c  # green
regular3 = ebcb8b  # yellow
regular4 = 81a1c1  # blue
regular5 = b48ead  # magenta
regular6 = 88c0d0  # cyan
regular7 = e5e9f0  # white

# Bright colors
bright0  = 4c566a  # bright black
bright1  = bf616a
bright2  = a3be8c
bright3  = ebcb8b
bright4  = 81a1c1
bright5  = b48ead
bright6  = 88c0d0
bright7  = eceff4

# TokyoNight (Night variant) - Alternative theme
# foreground = a9b1d6
